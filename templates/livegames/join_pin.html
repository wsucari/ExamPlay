{% extends "base.html" %}
{% block title %}Ingresar con PIN | ExamPlay{% endblock %}
{% block content %}<section class="game-background"><div class="container"><div class="row justify-content-center"><div class="col-md-6 col-lg-4"><div class="card border-0 shadow-lg"><div class="card-body p-4 p-md-5 text-center">
  <div class="display-5 mb-2">🎯</div><h1 class="h2 fw-bold">Únete a la partida</h1><p class="text-muted">Pide el PIN de seis dígitos a tu docente.</p>
  <form method="post" novalidate>{% csrf_token %}<label class="form-label" for="{{ form.pin.id_for_label }}">{{ form.pin.label }}</label>{{ form.pin }}{% for error in form.pin.errors %}<div class="text-danger small mt-2">{{ error }}</div>{% endfor %}<button class="btn btn-warning btn-lg w-100 mt-3" type="submit">Continuar</button></form>
</div></div></div></div></div></section>{% endblock %}
